<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos - ZonaTec</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #020617, #0f172a);
      color: white;
    }

    nav {
      background: #020617;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 15px;
    }

    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .title {
      text-align: center;
      margin: 40px 0;
      font-size: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      background: #334155;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
      font-size: 14px;
      margin-top: 40px;
    }

    @media (min-width: 768px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

        
        .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 25px;
    padding: 10px 16px;
    border-radius: 999px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: all 0.2s ease;
    }

    .back-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.4);
    background: linear-gradient(135deg, #16a34a, #15803d);
    }

    .back-btn:active {
    transform: scale(0.95);
    }
  </style>
</head>

<body>

<header style="text-align:center; padding:20px; background:#020617;">

  <img src="logo.png"
       style="
         width:80px;
         height:80px;
         border-radius:50%;
         object-fit:cover;
         border:3px solid #22c55e;
       ">

  <div style="margin-top:10px; font-size:20px; font-weight:bold;">
    ZonaTec
  </div>

</header>

<div class="container">

  <a href="index.html" class="back-btn">Inicio</a>

  <div class="title">Nuestros Productos 🛒</div>

  <!-- CONTENEDOR DE PRODUCTOS -->
  <div id="productos" class="grid"></div>

</div>

<footer>
  © 2026 ZonaTec
</footer>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYiefdp965YA22FO3PRRwO8vqWsQDJb-s",
    authDomain: "zonatec-8775e.firebaseapp.com",
    projectId: "zonatec-8775e",
    storageBucket: "zonatec-8775e.firebasestorage.app",
    messagingSenderId: "310926770434",
    appId: "1:310926770434:web:441c24b8714193fbddc21b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function cargarProductos() {
    const contenedor = document.getElementById("productos");

    try {
      const querySnapshot = await getDocs(collection(db, "productos"));

      if (querySnapshot.empty) {
        contenedor.innerHTML = "<p>No hay productos aún</p>";
        return;
      }

      querySnapshot.forEach((doc) => {
        const p = doc.data();

        contenedor.innerHTML += `
          <div class="card">
            <img src="${p.imagen}" alt="${p.nombre}">
            <h3>${p.nombre}</h3>
            <p style="color:#22c55e; font-weight:bold;">${p.precio}</p>
          </div>
        `;
      });

    } catch (error) {
      console.error("Error cargando productos:", error);
      contenedor.innerHTML = "<p>Error cargando productos</p>";
    }
  }

  cargarProductos();
</script>

</body>
</html>
