<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ZonaTec</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .header {
      width: 100%;
    }

    /* 🔝 FILA SUPERIOR */
    .top {
      background: #020617;
      color: #94a3b8;

      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 5px 30px;
      font-size: 12px;

      border-bottom: 1px solid #111;
    }

    .contact a {
      display: inline-flex;
      align-items: center;
      gap: 6px;

      color: #94a3b8;
      text-decoration: none;
      margin-right: 15px;
    }

    /* 🔻 FILA INFERIOR */
    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: 10px 30px;
      background: #020617;
    }

    /* LOGO */
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .logo img {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid #22c55e;
      background: white;
      object-fit: cover;
    }

    .logo span {
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    /* MENU */
    .menu a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 14px;
      padding-bottom: 3px;
    }

    .menu a:hover {
      color: #22c55e;
    }

    /* 🔥 ACTIVO */
    .menu a.active {
      color: #22d3ee;
      border-bottom: 2px solid #22d3ee;
      font-weight: bold;
    }

    /* ICONOS */
    .extras {
      display: flex;
      align-items: center;
    }

    .extras a {
      margin-left: 10px;
    }

    .icon {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    .top {
      min-height: 30px;
    }

    .bottom {
      min-height: 60px;
    }
  </style>
</head>

<body>

<header class="header">

  <!-- 🔝 ARRIBA -->
  <div class="top">

    <div class="contact">
      <a href="https://wa.me/50687062374" target="_blank">
        <img src="images/whatsapp.png" class="icon">
        +506 8706 2374
      </a>

      <a href="mailto:zonatec2614@gmail.com">
        <img src="images/gmail.png" class="icon">
        zonatec2614@gmail.com
      </a>
    </div>

    <div class="extras">
      <a href="https://www.google.com/maps?q=10.4553204,-84.5592117" target="_blank">
        <img src="images/marcador-de-posicion.png" class="icon">
      <a href="https://www.facebook.com/profile.php?id=61587070935593" target="_blank">
        <img src="images/facebook.png" class="icon">
      </a>
    </div>

  </div>

  <!-- 🔻 ABAJO -->
  <div class="bottom">

    <div class="logo" onclick="window.location.href='index.html'">
      <img src="images/logo.png" alt="ZonaTec">
      <span>ZonaTec</span>
    </div>

    <nav class="menu">
      <a href="index.html">Inicio</a>
      <a href="productos.html">Productos</a>
      <a href="#">Servicios</a>
      <a href="#">Contacto</a>
    </nav>

  </div>

</header>

</body>
</html>
