<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ZonaTec</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .hero {
      text-align: center;
      margin-top: 30px;
    }

    .hero h1 {
      font-size: 32px;
    }

    .hero p {
      color: #cbd5f5;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .section-title {
      margin-top: 50px;
      margin-bottom: 20px;
      font-size: 24px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    /* 🔥 CARRUSEL */
    .carousel {
      overflow: hidden;
      width: 100%;
      margin-top: 20px;
    }

    .carousel-track {
      display: flex;
      gap: 20px;
      animation: scroll 20s linear infinite;
    }

    .carousel-item {
      min-width: 200px;
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .carousel-item img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

        @keyframes scroll {
    0% {
        transform: translateX(0);
    }
    100% {
        transform: translateX(-50%);
    }
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (min-width: 768px) {
      .hero h1 {
        font-size: 40px;
      }

      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px 18px;
      border-radius: 50%;
      font-size: 20px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png"
       style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #22c55e;">
  <div style="margin-top:10px; font-size:20px; font-weight:bold;">
    ZonaTec
  </div>
</header>

<div class="container">

  <div class="hero">
    <h1>Reparación y Venta de Electrónicos</h1>
    <p>Celulares, accesorios y más</p>

    <a href="productos.html" class="btn">
      Ver productos 🛒
    </a>
  </div>

  <h2 class="section-title">🔥 Productos Destacados 🔥</h2>

  <div class="carousel">
    <div class="carousel-track" id="carousel-track"></div>
  </div>

  <h2 class="section-title">Servicios</h2>
  <div class="grid">
    <div class="card">📱 Reparación de celulares</div>
    <div class="card">🔌 Venta de cargadores</div>
    <div class="card">🎧 Audífonos y accesorios</div>
  </div>

</div>

<div style="margin-top:40px; padding:20px; text-align:center;">

  <h2>📍 Visitá nuestro local</h2>

  <div style="max-width:800px; margin:20px auto;">
    <iframe
      src="https://maps.google.com/maps?q=10.4553204,-84.5592117&z=17&output=embed"
      width="100%"
      height="400"
      style="border:0; border-radius:12px;">
    </iframe>
  </div>

  <div style="margin-top:10px;">
    <a href="https://www.google.com/maps?q=10.4553204,-84.5592117"
       target="_blank"
       style="color:#22c55e; font-weight:bold;">
       Ver en Google Maps
    </a>
  </div>

</div>

<footer>
  © 2026 ZonaTec
</footer>

<a href="https://wa.me/50686961522?text=Hola,%20quiero%20informacion"
   class="whatsapp-float">
   💬
</a>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYiefdp965YA22FO3PRRwO8vqWsQDJb-s",
    authDomain: "zonatec-8775e.firebaseapp.com",
    projectId: "zonatec-8775e",
    storageBucket: "zonatec-8775e.firebasestorage.app",
    messagingSenderId: "310926770434",
    appId: "1:310926770434:web:441c24b8714193fbddc21b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function cargarCarousel() {
    const contenedor = document.getElementById("carousel-track");

    try {
      const querySnapshot = await getDocs(collection(db, "productos"));

      let html = "";

      querySnapshot.forEach((doc) => {
        const p = doc.data();

        html += `
          <div class="carousel-item">
            <img src="${p.imagen || 'https://via.placeholder.com/200'}">
            <h4>${p.nombre}</h4>
            <p style="color:#22c55e; font-weight:bold;">${p.precio}</p>
          </div>
        `;
      });

      contenedor.innerHTML = html + html + html;

    } catch (error) {
      console.error(error);
    }
  }

  cargarCarousel();
</script>

</body>
</html>
