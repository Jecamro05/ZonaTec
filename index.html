<!DOCTYPE html>
<html lang="es">
<head>

<body>

<div id="header"></div>

<div class="container">

  <div class="hero">

    <p>Celulares, accesorios y más</p>

  </div>

  <div class="carousel">

  <h2 class="section-title">Servicios</h2>
  <div class="grid">

    <div class="card">🔌 Venta de cargadores</div>
    <div class="card">🎧 Audífonos y accesorios</div>
  </div>

</div>

<div style="margin-top:40px; padding:20px; text-align:center;">

  <h2>📍 Visitá nuestro local</h2>

  <div style="max-width:800px; margin:20px auto;">
    <iframe
      src="https://maps.google.com/maps?q=10.4553204,-84.5592117&z=17&output=embed"
      width="100%"

  <div style="margin-top:10px;">

</div>

<footer>

</footer>

<a href="https://wa.me/50686961522?text=Hola,%20quiero%20informacion"
   target="_blank"
   class="whatsapp-float">

  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"

</a>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYiefdp965YA22FO3PRRwO8vqWsQDJb-s",
    authDomain: "zonatec-8775e.firebaseapp.com",
    projectId: "zonatec-8775e",
    storageBucket: "zonatec-8775e.firebasestorage.app",
    messagingSenderId: "310926770434",
    appId: "1:310926770434:web:441c24b8714193fbddc21b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function cargarCarousel() {
    const contenedor = document.getElementById("carousel-track");

    try {
      const querySnapshot = await getDocs(collection(db, "productos"));

      let html = "";

      querySnapshot.forEach((doc) => {
        const p = doc.data();

        html += `
          <div class="carousel-item">
            <img src="${p.imagen || 'https://via.placeholder.com/200'}">
            <h4>${p.nombre}</h4>
            <p style="color:#22c55e; font-weight:bold;">${p.precio}</p>
          </div>
        `;
      });

      contenedor.innerHTML = html + html + html;

    } catch (error) {
      console.error(error);
    }
  }

  cargarCarousel();
  </script>
   
    <script>
      fetch("header.html")
      .then(res => res.text())
      .then(data => {
          document.getElementById("header").innerHTML = data;

          // 🔥 ACTIVAR MENÚ
          const links = document.querySelectorAll(".menu a");
          const current = window.location.pathname.split("/").pop();

          links.forEach(link => {
              if (link.getAttribute("href") === current) {
                  link.classList.add("active");
              }
          });
      });
    </script>

  <script>
    const links = document.querySelectorAll(".menu a");
    const current = window.location.pathname.split("/").pop();

    links.forEach(link => {
      if (link.getAttribute("href") === current) {
        link.classList.add("active");
      }
    });
</script>
</body>
</html>
