<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - ZonaTec</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div id="header"></div>

<div class="admin-container">

  <div id="loginBox" class="form">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
  </div>

  <div id="adminBox" style="display:none;">

    <div class="form">
      <h2>Agregar Producto</h2>

      <input type="text" id="nombre" placeholder="Nombre">
      <input type="text" id="precio" placeholder="₡0" oninput="formatearPrecio(this)">
      <input type="text" id="imagen" placeholder="Link de imagen">
      <input type="text" id="descripcion" placeholder="Descripción">

      <button onclick="guardar()">Guardar</button>

      <button onclick="logout()" style="background:red;">Salir</button>

      <div class="lista">
        <h3>Productos</h3>
        <div id="lista-productos"></div>
      </div>
    </div>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDYiefdp965YA22FO3PRRwO8vqWsQDJb-s",
    authDomain: "zonatec-8775e.firebaseapp.com",
    projectId: "zonatec-8775e",
    storageBucket: "zonatec-8775e.firebasestorage.app",
    messagingSenderId: "310926770434",
    appId: "1:310926770434:web:441c24b8714193fbddc21b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  await setPersistence(auth, browserSessionPersistence);

  window.login = async function () {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      alert("Error: " + e.message);
    }
  };

  window.logout = function () {
    signOut(auth);
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("adminBox").style.display = "block";
      cargarLista();
    } else {
      document.getElementById("loginBox").style.display = "block";
      document.getElementById("adminBox").style.display = "none";
    }
  });

  function formatearPrecio(input) {
    let valor = input.value.replace(/\D/g, "");
    if (!valor) return input.value = "";
    input.value = "₡" + Number(valor).toLocaleString("es-CR");
  }
  window.formatearPrecio = formatearPrecio;

  window.guardar = async function () {
    const nombre = document.getElementById("nombre").value;
    const precio = document.getElementById("precio").value;
    const imagen = document.getElementById("imagen").value;
    const descripcion = document.getElementById("descripcion").value;

    if (!nombre || !precio || !imagen || !descripcion) {
      alert("Complete todos los campos");
      return;
    }

    if (window.idEditando) {
      await updateDoc(doc(db, "productos", window.idEditando), { nombre, precio, imagen,descripcion });
      window.idEditando = null;
    } else {
      await addDoc(collection(db, "productos"), { nombre, precio, imagen, descripcion });
    }

    document.getElementById("nombre").value = "";
    document.getElementById("precio").value = "";
    document.getElementById("imagen").value = "";
    document.getElementById("descripcion").value = "";

    cargarLista();
  };

  async function cargarLista() {
    const cont = document.getElementById("lista-productos");
    cont.innerHTML = "";

    const snap = await getDocs(collection(db, "productos"));
    snap.forEach(d => {
      const p = d.data();
      cont.innerHTML += `
        <div class="item">
          <strong>${p.nombre}</strong><br>
          ${p.precio}
          <div class="acciones">
            <button onclick="eliminar('${d.id}')">🗑</button>
            <button onclick="editar('${d.id}', '${p.nombre}', '${p.precio}', '${p.imagen}', '${p.descripcion}')">✏️</button>
          </div>
        </div>
      `;
    });
  }

  window.eliminar = async (id) => {
    if (!confirm("¿Eliminar producto?")) return;
    await deleteDoc(doc(db, "productos", id));
    cargarLista();
  };

  window.editar = (id, n, p, i, d) => {
    document.getElementById("nombre").value = n;
    document.getElementById("precio").value = p;
    document.getElementById("imagen").value = i;
    document.getElementById("descripcion").value = d;
    window.idEditando = id;
  };
</script>

<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>

</body>
</html>
